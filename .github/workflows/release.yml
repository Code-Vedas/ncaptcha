name: Release

permissions:
  contents: read

on:
  push:
    tags:
      - v*

concurrency:
  group: release
  cancel-in-progress: true

jobs:
  test_and_build:
    name: Test & Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run coverage
        env:
          NCAPTCHA_SECRET: ${{ secrets.NCAPTCHA_SECRET }}
      - run: npm run build

  publish:
    name: Publish Package
    runs-on: ubuntu-latest
    needs: [test_and_build]
    permissions:
      contents: write
      id-token: write
    environment: release
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm
        run: npm publish --provenance --access public
